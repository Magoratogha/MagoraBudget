<mat-drawer-container hasBackdrop>
  <mat-drawer mode="over" [autoFocus]="false">
    <app-side-panel [showNewVersionBadge]="newVersionAvailable()"/>
  </mat-drawer>
  <mat-drawer-content>
    <div class="container">
      @if (auth.getLoggedUser()) {
        <app-profile-picture
          radius="50%"
          [size]="40"
          (click)="overlay.openSidePanel()"/>
      }
      <div class="router-outlet-container">
        <router-outlet/>
      </div>
    </div>
    @if (auth.getLoggedUser()) {
      <app-navbar [items]="NAVBAR_ITEMS" (createButtonClicked)="onCreateButtonClick()"/>
    }
  </mat-drawer-content>
</mat-drawer-container>
