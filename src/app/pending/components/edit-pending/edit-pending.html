<div class="d-flex align-items-start justify-content-between mb-3 w-100 gap-3 px-2">
  <h1 class="fw-bold text-start">{{ pending()?.label ? pending()?.label : 'Nuevo Pendiente' }}</h1>
  @if (pending()?.id) {
    <button matIconButton (click)="delete()">
      <mat-icon class="material-symbols-rounded text-red">delete</mat-icon>
    </button>
  }
</div>
