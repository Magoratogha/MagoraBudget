<h2 mat-dialog-title>{{ title() }}</h2>
<mat-dialog-content>
  @if (Array.isArray(description())) {
    @for (desc of description(); track desc) {
      <p class="mb-3">{{ desc }}</p>
    }
  } @else {
    <p>{{ description() }}</p>
  }
</mat-dialog-content>
<mat-dialog-actions>
  <button matButton mat-dialog-close>Cancelar</button>
  <button matButton="filled" [mat-dialog-close]="true">Ok</button>
</mat-dialog-actions>
