<div class="d-flex flex-column gap-4">
  <div>
    <h1 class="fw-bold mb-3">Saldo</h1>
    <mat-card appearance="filled" class="content-wrapper mb-2">
      <mat-card-content>
        <div class="items-container">
          <div class="main-content">
            <h1 class="text-center main-title"
                [class.text-green]="availableBalance() > 0"
                [class.text-red]="availableBalance() < 0">{{ availableBalance() | currency : 'COP' : 'symbol' : '1.0-0' }}</h1>
            <small class="fw-bold" [class.text-green]="availableBalance() > 0"
                   [class.text-red]="availableBalance() < 0">Disponible</small>
          </div>
          <div class="d-flex flex-column align-items-center w-100">
            <h5 class="text-center fw-bold"
                [class.text-green]="globalBalance() > 0"
                [class.text-red]="globalBalance() < 0">{{ globalBalance() | currency : 'COP' : 'symbol' : '1.0-0' }}</h5>
            <small class="fw-bold" [class.text-green]="globalBalance() > 0"
                   [class.text-red]="globalBalance() < 0">Neto</small>
          </div>
        </div>
      </mat-card-content>
    </mat-card>
  </div>
  @if (accounts().length) {
    <div>
      <h1 class="fw-bold mb-3">Cuentas</h1>
      <div class="d-flex flex-column gap-2">
        @for (account of accounts(); track account.id) {
          <app-account [account]="account"></app-account>
        }
      </div>
    </div>
  }
  <button matButton="filled" class="w-100" (click)="addNewAccount()">Agregar nueva cuenta</button>
</div>
